<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Watch Wheel</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" href="style.css">
        <style>
            /*** Body ***/
            body {
                background: #0000ff;
                background: linear-gradient(90deg,rgba(0, 0, 255, 1) 0%, rgba(9, 9, 121, 1) 35%, rgba(0, 212, 255, 1) 100%);
                font-family: monospace;
            }

            /*does the title*/
            #title {
                text-align: center;
            }

            /*** Columns ***/
            .col {
                position: absolute;

                top: 10%;
                height: 80%;

                background-color: #FFFFFFA8;
                border: 1.5px solid darkgray;
                padding-left: 10px;
                padding-right: 10px;
            }
            #left-col {
                transform: translate(0%, 0%);
                left: 5%;
                width: 23.5%;
                border-radius: 17.5px 0px 0px 17.5px;
                overflow: auto;
            }
            #mid-col {
                transform: translate(-50%, 0%);
                left: 50%;
                width: 35%;
                overflow: auto;
            }
            #right-col {
                transform: translate(-100%, 0%);
                left: 95%;
                width: 23.5%;
                border-radius: 0px 17.5px 17.5px 0px;
                overflow: auto;
            }


            /*** Left column ***/
            #movie-filter {
                margin: 10px;
            }
            .preference-group {
                border: 1px solid #9aa7c0;
                border-radius: 10px;
                padding: 10px;
                background: #f7f9ff;
            }
            .preference-group--scroll {
                max-height: 220px;
                overflow-y: auto;
                overflow-x: hidden;
                scrollbar-gutter: stable;
                scrollbar-width: thin;
                scrollbar-color: #a6b4d3 transparent;
                padding-right: 6px;
            }
            .preference-group--grid-multi {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(125px, 1fr));
                gap: 8px;
            }
            .preference-group--grid-single {
                display: grid;
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .genre-item,
            .person-item,
            .language-item,
            .streaming-region-item {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 6px 8px;
                border-radius: 8px;
                background-color: #ffffff;
                border: 1px solid #d7dff0;
            }
            .genre-item:hover,
            .person-item:hover,
            .language-item:hover,
            .streaming-region-item:hover {
                border-color: #8fa5d6;
                background-color: #eef3ff;
            }
            .preference-group--scroll input {
                margin: 0;
                accent-color: #3057a6;
            }
            .preference-group--scroll label {
                cursor: pointer;
                line-height: 1.2;
                font-size: 0.9rem;
            }
            .preference-group--scroll::-webkit-scrollbar {
                width: 10px;
            }
            .preference-group--scroll::-webkit-scrollbar-track {
                background: transparent;
                border-radius: 999px;
                margin: 6px 2px 6px 0;
            }
            .preference-group--scroll::-webkit-scrollbar-thumb {
                background-color: #a6b4d3;
                border-radius: 999px;
                border: 2px solid #f7f9ff;
            }
            .filtergroup-line {
                display: none;
            }
            #filter-submit-div {
                position: sticky;
                transform: translate(0%, 0%);
                top: 10px;
                padding: 5px;

                background-color: #FFFFFFA8;
                border: 1.5px solid darkgray;
                border-radius: 5px;
            }

            /*** Middle Column Stuff ***/
            #potential-movies-header {
                text-align: center;
            }
            #adderbox-div {
                position: absolute;
                transform: translate(-50%, -100%);
                left: 50%; top: 98%;
                width: 95%; height: 5%;

                background-color: #FFFFFFA8;
                border: 1.5px solid darkgray;
                border-radius: 5px;
            }
            #adderbox-text {
                position: absolute;
                transform: translate(0%, -50%);
                left: 0%; top: 50%;

                width: 79%; height: 100%;
                box-sizing: border-box;
            } #adderbox-text:focus {
                outline: none;
                box-shadow: none !important;
                border: 1px solid transparent;
            }
            #adderbox-submit {
                position: absolute;
                transform: translate(-100%, -50%);
                left: 100%; top: 50%;

                width: 19%; height: 100%;
                box-sizing: border-box;
            } #adderbox-submit:focus {
                outline: none;
                box-shadow: none !important;
                border: 1px solid transparent;
            }

            /*** Right column stuff ***/
            #results-header {
                text-align: center;
            }
            #results-image {
                position: absolute;
                transform: translate(-50%, -50%);
                left: 50%; top: 50%;
                width: 95%;
                max-height: 55vh;
                object-fit: contain;
                display: block;
                margin-top: 12px;
            }
            #movie-selector-div {
                position: sticky;
                transform: translate(0%, 0%);
                top: 10px;
                padding: 5px;
                width: 95%;

                background-color: #FFFFFFA8;
                border: 1.5px solid darkgray;
                border-radius: 5px;
            }
        </style>
    </head>
    <body>
        <!--title-->
            <h1 id="title">Welcome to Watch Wheel!!</h1>

        <!--first column with all the movie attributes-->
        <div id="left-col" class="col">
            <div id="filter-submit-div">
                <input type="submit" form="movie-filter" value="Submit"/>
                <input type="reset" form="movie-filter"></input>
            </div>
            <form id="movie-filter">
                <h2 class="preference-heading">Genre&ensp;<button id="genres-showmore" class="showmore-button" type="button"><i class="fas fa-caret-up"></i></button></h2>
                <fieldset id="genres" class="preference-group preference-group--scroll preference-group--grid-multi">
                </fieldset>
                <hr id="genres-line" class="filtergroup-line"/>

                <h2 class="preference-heading">Language&ensp;<button id="languages-showmore" class="showmore-button" type="button"><i class="fas fa-caret-up"></i></button></h2>
                <fieldset id="languages" class="preference-group preference-group--scroll preference-group--grid-single">
                </fieldset>
                <hr id="languages-line" class="filtergroup-line"/>

                <h2 class="preference-heading">Release Date&ensp;<button id="release-date-showmore" class="showmore-button" type="button"><i class="fas fa-caret-up"></i></button></h2>
                <fieldset id="release-date" class="preference-group">
                    <input id="min-release-slider" type="range" min="1900" max="2026" value="1900" step="1"/>
                    <input id="max-release-slider" type="range" min="1900" max="2026" value="2026" step="1"/><br/>
                    <label for="primary_release_date.gte">Min</label>
                    <input id="min-release-scrubber" type="number" name="primary_release_date.gte" value="1900" min="1900" max="2026" step="1" style="max-width: 50px"/>
                    <label for="primary_release_date.lte">Max</label>
                    <input id="max-release-scrubber" type="number" name="primary_release_date.lte" value="2026" min="1900" max="2026" step="1" style="max-width: 50px"/>
                </fieldset>
                <hr id="release-date-line" class="filtergroup-line"/>

                <h2 class="preference-heading">Runtime&ensp;<button id="runtime-showmore" class="showmore-button" type="button"><i class="fas fa-caret-up"></i></button></h2>
                <fieldset id="runtime" class="preference-group">
                    <input id="min-runtime-slider" type="range" min="0" max="5" step="0.1"/>
                    <input id="max-runtime-slider" type="range" min="0" max="5" step="0.1"/><br/>
                    <label for="min-runtime">Min</label>
                    <input id="min-runtime-scrubber" type="number" name="min-runtime" value="2.5" min="0" max="5" step="0.1" style="max-width: 50px"/>
                    <label for="max-runtime">Max</label>
                    <input id="max-runtime-scrubber" type="number" name="max-runtime" value="2.5" min="0" max="5" step="0.1" style="max-width: 50px"/>
                </fieldset>
                <hr id="runtime-line" class="filtergroup-line"/>

                <h2 class="preference-heading">Minimum Rating&ensp;<button id="min-rating-showmore" class="showmore-button" type="button"><i class="fas fa-caret-up"></i></button></h2>
                <fieldset id="min-rating" class="preference-group">
                    <input id="min-rating-slider" type="range" min="0" max="10" step="0.1"/><br/>
                    <label for="min-rating">Min</label>
                    <input id="min-rating-scrubber" type="number" name="min-rating" value="5" min="0" max="10" step="0.1" style="max-width: 50px"/>
                </fieldset>
                <hr id="min-rating-line" class="filtergroup-line"/>

                <h2 class="preference-heading">Involved Persons&ensp;<button id="involved-persons-showmore" class="showmore-button" type="button"><i class="fas fa-caret-up"></i></button></h2>
                <fieldset id="involved-persons" class="preference-group preference-group--scroll preference-group--grid-multi">
                </fieldset>
                <hr id="involved-persons-line" class="filtergroup-line"/>

                <!--TODO: Fix the Studio API call-->
                <!--h2 class="preference-heading">Involved Studios&ensp;<button id="involved-studios-showmore" class="showmore-button" type="button"><i class="fas fa-caret-up"></i></button></h2>
                <fieldset id="involved-studios" class="preference-group">
                </fieldset>
                <hr id="involved-studios-line" class="filtergroup-line"/-->

                <h2 class="preference-heading">Streaming Region&ensp;<button id="streaming-regions-showmore" class="showmore-button" type="button"><i class="fas fa-caret-up"></i></button></h2>
                <fieldset id="streaming-regions" class="preference-group preference-group--scroll preference-group--grid-single">
                </fieldset>
            </form>
        </div>

        <!--middle column where the wheel will be-->
        <div id="mid-col" class="col">
            <h2 id="potential-movies-header">Potential Movies:</h2>
            <hr/>

            <ul id="movie-list">
            </ul>

            <div id="adderbox-div">
                <form id="adderbox">
                    <input id="adderbox-text" type="text" placeholder="Add titles manually"></input>
                    <input id="adderbox-submit" type="submit">Submit</input>
                </form>
            </div>
        </div>

        <!--right column with movie poster-->
        <div id="right-col" class="col">
            <div id="movie-selector-div">
                <button id="movie-selector">Pick a Movie</button>
            </div><br/>
            <h2 id="results-header"></h2>
            <img id="results-image" src="assets/question-mark.png"></img>
        </div>

        <!--runs our scripts-->
        <script src="get-criteria.js"></script>
        <script src="get-movies.js"></script>
        <script src="select-movie.js"></script>
    </body>
</html>
