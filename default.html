<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Watch Wheel</title>
        <link rel="stylesheet" href="style.css">
        <style>
            /*** Body ***/
            body {
                background: #2A7B9B;
                background: linear-gradient(100deg,rgba(42, 123, 155, 1) 0%, rgba(87, 199, 133, 1) 50%, rgba(237, 221, 83, 1) 100%);
            }

            /*does the title*/
            #title {
                text-align: center;
            }

            /*** General columns ***/
            .col {
                position: absolute;

                top: 10%;
                height: 80%;
                /*border: 1px solid red;
                border-radius: 15px;
                /*padding: 20px;*/
            }

            /*** Left column ***/
            #movie-filter {
                margin: 10px;
            }
        </style>
    </head>
    <body>
        <!--title-->
            <h1 id="title">Welcome to Watch Wheel!!</h1>

        <!--first column with all the movie attributes-->
        <div id="left-col" class="col" style="transform: translate(0%, 0%); left: 5%; width: 23.5%;">
            <form id="movie-filter">
                <h2>Genre</h2>
                <fieldset id="genres" style="display: none;">
                    <legend>Genre</legend>
                </fieldset>
                <hr/>

                <h2>Language</h2>
                <fieldset id="languages" style="display: none;">
                    <legend>Language</legend>
                </fieldset>
                <hr/>

                <h2>Release Date</h2>
                <fieldset id="release-date" style="display: none;">
                    <legend>Release Date</legend>
                    <input type="date" name="Release Date"></fieldset>
                </fieldset>
                <hr/>

                <h2>Runtime</h2>
                <fieldset id="runtime">
                    <legend>Runtime</legend>
                    <input id="min-runtime-slider" type="range" min="0" max="5" step="0.1"/>
                    <input id="max-runtime-slider" type="range" min="0" max="5" step="0.1"/><br/>
                    <label for="min-runtime">Min</label>
                    <input id="min-runtime-scrubber" type="number" name="min-runtime" value="2.5" min="0" max="5" step="0.1" style="max-width: 50px"/>
                    <label for="max-runtime">Max</label>
                    <input id="max-runtime-scrubber" type="number" name="max-runtime" value="2.5" min="0" max="5" step="0.1" style="max-width: 50px"/>
                </fieldset>
                <hr/>

                <h2>Minimum Rating</h2>
                <fieldset id="min-rating" style="display: none;">
                    <legend>Average Rating</legend>
                    <input id="min-rating-slider" type="range" min="0" max="10" step="0.1"/><br/>
                    <label for="min-rating">Min</label>
                    <input id="min-rating-scrubber" type="number" name="min-rating" value="5" min="0" max="10" step="0.1" style="max-width: 50px"/>
                </fieldset>
                <hr/>

                <h2>Involved Persons</h2>
                <fieldset id="involved-persons" style="display: none;">
                    <legend>Involved Persons</legend>
                </fieldset>
                <hr/>

                <h2>Involved Studios</h2>
                <fieldset id="involved-studios" style="display: none;">
                    <legend>Involved Studios</legend>
                </fieldset>
                <hr/>

                <h2>Streaming Region</h2>
                <fieldset id="streaming-regions" style="display: none;">
                    <legend>Streaming Region</legend>
                </fieldset>
                <hr/>

                <input type="submit" value="Submit"/>

                <!--clear button-->
                <input type="reset"></input>
            </form>
        </div>

        <!--middle column where the wheel will be-->
        <div id="mid-col" class="col" style="transform: translate(-50%, 0%); left: 50%; width: 35%;">

        </div>

        <!--right column with movie poster-->
        <div id="right-col" class="col" style="transform: translate(-100%, 0%); left: 95%; width: 23.5%;">

        </div>

        <!--runs our scripts-->
        <script src="get-criteria.js"></script>
        <script src="get-movies.js"></script>
    </body>
</html>
